---
- name: Validate supported PostgreSQL version
  ansible.builtin.assert:
    that:
      - postgresql_version | int in [14, 15, 16]
    fail_msg: "Unsupported postgresql_version={{ postgresql_version }}. Supported: 14, 15, 16"

- name: Build PostgreSQL variables from version
  ansible.builtin.set_fact:
    postgresql_init_cmd: "/usr/pgsql-{{ postgresql_version }}/bin/postgresql-{{ postgresql_version }}-setup initdb"
    postgresql_packages:
      - "postgresql{{ postgresql_version }}-devel"
      - "postgresql{{ postgresql_version }}-server"
    postgresql_service_name: "postgresql-{{ postgresql_version }}"

- name: Install PostgreSQL RPM (PGDG for EL9)
  ansible.builtin.dnf:
    name: "{{ postgresql_rpm }}"
    disable_gpg_check: true

- name: Disable Repo GPG check of PostgreSQL repo
  ansible.builtin.replace:
    path: /etc/yum.repos.d/pgdg-redhat-all.repo
    regexp: 'repo_gpgcheck = 1'
    replace: 'repo_gpgcheck = 0'

- name: Disable default PostgreSQL module
  ansible.builtin.command: dnf -qy --nogpgcheck module disable postgresql
  changed_when: false

- name: Install Core DNF Plugins
  ansible.builtin.dnf:
    name: dnf-plugins-core

- name: Check if CodeReady Builder repository is enabled (CentOS Stream 9)
  ansible.builtin.shell:
    cmd: dnf repolist enabled | grep -qw crb
  register: crb_check
  changed_when: false
  ignore_errors: true

- name: Enable CodeReady Builder repository (CentOS Stream 9)
  ansible.builtin.command:
    cmd: dnf config-manager --set-enabled crb
  changed_when: crb_check.rc != 0
  when:
    - crb_check.rc != 0

- name: Install perl(IPC::Run)
  ansible.builtin.dnf:
    name: perl-IPC-Run
    state: present

- name: Install PostgreSQL packages
  ansible.builtin.dnf:
    name: "{{ postgresql_packages }}"
    state: present
    disable_gpg_check: true

- name: Create a new PostgreSQL database cluster
  ansible.builtin.shell:
    cmd: "{{ postgresql_init_cmd }}"  # noqa command-instead-of-shell
  register: initdb_output
  changed_when: "'Initializing database ... OK' in initdb_output.stdout"
  ignore_errors: true
  environment:
    PGSETUP_INITDB_OPTIONS: "{{ postgresql_init_cmd_options }}"

- name: Start PostgreSQL server
  ansible.builtin.systemd_service:
    name: "{{ postgresql_service_name }}"
    state: started
    enabled: true
